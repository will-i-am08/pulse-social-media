<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CaptionCraft</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class'}</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc}
.dark body,.dark #app{background:#0f172a;color:#e2e8f0}
.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.line-clamp-3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse-anim{animation:pulse 1.5s ease infinite}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
#toast-wrap{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 16px;border-radius:8px;font-size:14px;font-weight:500;max-width:320px;animation:slideIn .3s ease;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:auto}
.toast-ok{background:#22c55e;color:#fff}
.toast-err{background:#ef4444;color:#fff}
.toast-info{background:#6366f1;color:#fff}
#sidebar{width:236px;min-height:100vh;background:#fff;border-right:1px solid #e2e8f0;padding:16px;flex-shrink:0;display:flex;flex-direction:column;transition:transform .2s}
.dark #sidebar{background:#0f172a;border-color:#1e293b}
#main{flex:1;overflow-y:auto;min-height:100vh}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#64748b;transition:all .15s;margin-bottom:2px;text-decoration:none;user-select:none}
.nav-item:hover{background:#f1f5f9;color:#334155}
.nav-item.active{background:#eef2ff;color:#4f46e5}
.dark .nav-item{color:#94a3b8}
.dark .nav-item:hover{background:#1e293b;color:#e2e8f0}
.dark .nav-item.active{background:#1e1b4b;color:#818cf8}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px}
.dark .card{background:#1e293b;border-color:#334155}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;text-decoration:none}
.btn-p{background:#6366f1;color:#fff}.btn-p:hover{background:#4f46e5}
.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:#fff;color:#334155;border:1px solid #e2e8f0}.btn-o:hover{background:#f1f5f9}
.dark .btn-o{background:#1e293b;color:#e2e8f0;border-color:#334155}.dark .btn-o:hover{background:#334155}
.btn-d{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}.btn-d:hover{background:#fee2e2}
.btn-sm{padding:5px 10px;font-size:12px}
.inp{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#334155;transition:border-color .15s}
.inp:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.dark .inp{background:#1e293b;border-color:#334155;color:#e2e8f0}
.dark .inp:focus{border-color:#818cf8}
.ta{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;resize:vertical;background:#fff;color:#334155;min-height:80px}
.ta:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.dark .ta{background:#1e293b;border-color:#334155;color:#e2e8f0}
.sel{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#334155}
.sel:focus{border-color:#6366f1}
.dark .sel{background:#1e293b;border-color:#334155;color:#e2e8f0}
.lbl{display:block;font-size:13px;font-weight:500;color:#475569;margin-bottom:6px}
.dark .lbl{color:#94a3b8}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid}
.bd-draft{background:#fef9c3;color:#a16207;border-color:#fde047}
.bd-sub{background:#ede9fe;color:#6d28d9;border-color:#c4b5fd}
.bd-app{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.bd-sched{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.bd-pub{background:#dcfce7;color:#166534;border-color:#86efac}
.bd-gray{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
.dark .bd-draft{background:#3f3200;color:#fbbf24;border-color:#78350f}
.dark .bd-sub{background:#2d1b69;color:#c4b5fd;border-color:#4c1d95}
.dark .bd-app{background:#022c22;color:#6ee7b7;border-color:#065f46}
.dark .bd-sched{background:#1e3a5f;color:#93c5fd;border-color:#1e40af}
.dark .bd-pub{background:#15301f;color:#86efac;border-color:#166534}
.dark .bd-gray{background:#1e293b;color:#94a3b8;border-color:#334155}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:16px;padding:24px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto}
.dark .modal{background:#1e293b;color:#e2e8f0}
.cal-day{min-height:80px;padding:4px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s}
.cal-day:hover{background:#f8fafc}
.dark .cal-day{border-color:#1e293b}.dark .cal-day:hover{background:#1e293b}
.cal-pill{font-size:10px;padding:1px 5px;border-radius:10px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:1px;cursor:pointer}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.skeleton{background:#f1f5f9;border-radius:8px;animation:pulse 1.5s ease infinite}
.dark .skeleton{background:#1e293b}
@media(max-width:768px){
  #sidebar{position:fixed;z-index:200;top:0;left:0;height:100vh;transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
  #mob-overlay.show{display:block}
}
</style>
</head>
<body>
<div id="app" class="flex">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="flex items-center gap-2 mb-6 px-2 pt-2">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white font-bold text-sm">CC</div>
      <span class="font-bold text-base text-slate-800 dark:text-white">CaptionCraft</span>
    </div>
    <div id="nav-links"></div>
    <div class="mt-auto pt-4 border-t border-slate-200 dark:border-slate-700">
      <div class="nav-item" onclick="nav('profile')">
        <span>👤</span><span>Profile</span>
      </div>
      <div class="nav-item" onclick="nav('settings')">
        <span>⚙️</span><span>Settings</span>
      </div>
      <div class="nav-item" onclick="toggleDark()">
        <span id="dark-icon">🌙</span><span id="dark-label">Dark Mode</span>
      </div>
    </div>
  </nav>
  <div id="mob-overlay" onclick="closeMobSidebar()"></div>

  <!-- Main -->
  <main id="main">
    <!-- Mobile header -->
    <div class="md:hidden sticky top-0 z-50 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex items-center gap-3">
      <button onclick="openMobSidebar()" class="text-slate-600 dark:text-slate-300 text-xl">☰</button>
      <span class="font-bold text-slate-800 dark:text-white">CaptionCraft</span>
    </div>
    <div id="page"></div>
  </main>
</div>
<div id="toast-wrap"></div>
<div id="modal-root"></div>

<script>
// ============================
// DB — localStorage
// ============================
const KEYS = {brands:'cc_brands',posts:'cc_posts',photos:'cc_photos',folders:'cc_folders',clients:'cc_clients',team:'cc_team',settings:'cc_settings',profile:'cc_profile'};

function dbGet(k){try{return JSON.parse(localStorage.getItem(k)||'null')}catch{return null}}
function dbSet(k,v){localStorage.setItem(k,JSON.stringify(v))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

const DB = {
  brands:()=>dbGet(KEYS.brands)||[],
  posts:()=>dbGet(KEYS.posts)||[],
  photos:()=>dbGet(KEYS.photos)||[],
  folders:()=>dbGet(KEYS.folders)||[],
  clients:()=>dbGet(KEYS.clients)||[],
  team:()=>dbGet(KEYS.team)||[],
  settings:()=>dbGet(KEYS.settings)||{timezone:'UTC',defaultPlatforms:['instagram'],emailNotifications:true,workspaceName:'My Agency',makeWebhookUrl:'https://hook.eu1.make.com/rrwvx199r4prra3f8jpblgdc3bp8bp46',autoSendOnApprove:false,bufferChannels:[]},
  profile:()=>dbGet(KEYS.profile)||{name:'Agency User',email:'user@agency.com'},
  save:{
    brands:v=>dbSet(KEYS.brands,v),
    posts:v=>dbSet(KEYS.posts,v),
    photos:v=>dbSet(KEYS.photos,v),
    folders:v=>dbSet(KEYS.folders,v),
    clients:v=>dbSet(KEYS.clients,v),
    team:v=>dbSet(KEYS.team,v),
    settings:v=>dbSet(KEYS.settings,v),
    profile:v=>dbSet(KEYS.profile,v),
  }
};

// ============================
// State
// ============================
let currentPage = 'dashboard';
let isDark = localStorage.getItem('cc_dark')==='1';
if(isDark)document.documentElement.classList.add('dark');

// ============================
// Nav
// ============================
const NAV = [
  {id:'dashboard',label:'Dashboard',icon:'🏠'},
  {id:'create-post',label:'Create Post',icon:'✏️'},
  {id:'posts',label:'Posts',icon:'📄'},
  {id:'calendar',label:'Calendar',icon:'📅'},
  {id:'brands',label:'Brands',icon:'🏷️'},
  {id:'photo-library',label:'Photo Library',icon:'🖼️'},
  {id:'analytics',label:'Analytics',icon:'📊'},
  {id:'clients',label:'Clients',icon:'👥'},
  {id:'team',label:'Team',icon:'🤝'},
  {id:'holidays',label:'Holidays',icon:'🎉'},
];

function renderNav(){
  const el=document.getElementById('nav-links');
  el.innerHTML=NAV.map(n=>`<div class="nav-item${currentPage===n.id?' active':''}" onclick="nav('${n.id}')"><span>${n.icon}</span><span>${n.label}</span></div>`).join('');
}

function nav(page){
  currentPage=page;
  renderNav();
  closeMobSidebar();
  renderPage();
  window.scrollTo(0,0);
}

function openMobSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mob-overlay').classList.add('show')}
function closeMobSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mob-overlay').classList.remove('show')}

function toggleDark(){
  isDark=!isDark;
  document.documentElement.classList.toggle('dark',isDark);
  localStorage.setItem('cc_dark',isDark?'1':'0');
  document.getElementById('dark-icon').textContent=isDark?'☀️':'🌙';
  document.getElementById('dark-label').textContent=isDark?'Light Mode':'Dark Mode';
}

// ============================
// Toast
// ============================
function toast(msg,type='ok'){
  const w=document.getElementById('toast-wrap');
  const d=document.createElement('div');
  d.className=`toast toast-${type}`;
  d.textContent=msg;
  w.appendChild(d);
  setTimeout(()=>d.remove(),3200);
}

// ============================
// Modal helpers
// ============================
function showModal(html){
  const r=document.getElementById('modal-root');
  r.innerHTML=`<div class="overlay" id="modal-overlay">${html}</div>`;
}
function closeModal(){document.getElementById('modal-root').innerHTML=''}

// ============================
// Confirm dialog
// ============================
let _confirmCb=null;
function _runConfirm(){closeModal();if(_confirmCb){_confirmCb();_confirmCb=null;}}
function confirm2(title,desc,onOk,okLabel='Delete',danger=true){
  _confirmCb=onOk;
  showModal(`<div class="modal" style="max-width:400px">
    <h3 class="text-lg font-semibold mb-2">${title}</h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">${desc}</p>
    <div class="flex gap-3 justify-end">
      <button class="btn btn-o" onclick="closeModal()">Cancel</button>
      <button class="btn ${danger?'btn-d':'btn-p'}" onclick="_runConfirm()">${okLabel}</button>
    </div>
  </div>`);
}

// ============================
// Claude API helpers
// ============================
async function callClaude(systemPrompt, userContent, maxTokens=1024){
  const key=localStorage.getItem('cc_api_key');
  if(!key){toast('Add your Claude API key in Settings → Claude API','err');return null;}
  const model=localStorage.getItem('cc_model')||'claude-sonnet-4-6';
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true',
      },
      body:JSON.stringify({model,max_tokens:maxTokens,system:systemPrompt,messages:[{role:'user',content:userContent}]})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'Claude API error');
    return data.content[0].text;
  }catch(e){toast('Claude API error: '+e.message,'err');return null;}
}

function buildImageContent(dataUrl,textPrompt){
  if(!dataUrl||!dataUrl.startsWith('data:'))return textPrompt;
  const [meta,b64]=dataUrl.split(',');
  const mediaType=meta.match(/data:([^;]+)/)[1];
  return[
    {type:'image',source:{type:'base64',media_type:mediaType,data:b64}},
    {type:'text',text:textPrompt}
  ];
}

// ============================
// Mock AI caption generator (fallback when no API key)
// ============================
function generateCaptionMock(brand,platforms,customPrompt){
  const tones={
    professional:['Elevating your brand with','Strategic excellence in','Innovation meets','Delivering premium'],
    casual:['Just loving','Super excited about','Check out','We\'re so happy with'],
    playful:['🎉 How fun is','✨ Obsessed with','Living for this','Can\'t get enough of'],
    luxury:['Exclusively crafted for','Bespoke and curated','The pinnacle of','Unrivalled excellence in'],
    inspirational:['Transform your journey with','Believe in the power of','Every step forward with','Rise above with'],
    friendly:['We love sharing','So happy to bring you','Together we create','Join us in celebrating'],
  };
  const hashtags={
    instagram:['#brand','#content','#socialmedia','#marketing','#instagood'],
    facebook:['#business','#marketing'],
    linkedin:['#businessgrowth','#marketing','#professional'],
  };
  const tone=brand.tone||'professional';
  const starters=tones[tone]||tones.professional;
  const starter=starters[Math.floor(Math.random()*starters.length)];
  let caption=`${starter} ${brand.name}.\n\n`;
  if(customPrompt)caption+=`${customPrompt}\n\n`;
  else caption+=`Discover what makes ${brand.name} different — quality, passion, and commitment to excellence. We're here to bring you something truly special.\n\n`;
  if(brand.brand_guidelines)caption+=`${brand.brand_guidelines.slice(0,80)}...\n\n`;
  if(brand.include_hashtags!==false){
    const tags=new Set();
    (platforms||['instagram']).forEach(p=>{(hashtags[p]||[]).forEach(h=>tags.add(h))});
    caption+=Array.from(tags).slice(0,5).join(' ');
  }
  if(brand.output_length==='short')caption=caption.slice(0,200);
  else if(brand.output_length==='medium')caption=caption.slice(0,400);
  return caption.trim();
}

// ============================
// Utility
// ============================
function fmtDate(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateTime(iso){
  if(!iso)return'—';
  const d=new Date(iso);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getBrand(id){return DB.brands().find(b=>b.id===id)}
function statusBadge(s){const m={draft:'bd-draft',submitted:'bd-sub',approved:'bd-app',scheduled:'bd-sched',published:'bd-pub'};return`<span class="badge ${m[s]||'bd-gray'}">${s||'draft'}</span>`}

function readFileAsDataURL(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// ============================
// DASHBOARD PAGE
// ============================
function renderDashboard(){
  const brands=DB.brands();
  const posts=DB.posts();
  const scheduled=posts.filter(p=>p.status==='scheduled');
  const drafts=posts.filter(p=>p.status==='draft');
  const published=posts.filter(p=>p.status==='published');
  const submitted=posts.filter(p=>p.status==='submitted');

  const stats=[
    {label:'Brands',val:brands.length,icon:'🏷️',color:'text-violet-500',page:'brands'},
    {label:'Drafts',val:drafts.length,icon:'📝',color:'text-yellow-500',page:'posts'},
    {label:'Scheduled',val:scheduled.length,icon:'📅',color:'text-blue-500',page:'posts'},
    {label:'Published',val:published.length,icon:'✅',color:'text-green-500',page:'posts'},
  ];

  const upcomingSched=scheduled.slice(0,5);
  const brandList=brands.slice(0,5);

  document.getElementById('page').innerHTML=`
  <div class="p-6 max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Dashboard</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Your content at a glance</p>
      </div>
      <button class="btn btn-p" onclick="nav('create-post')">✏️ New Post</button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      ${stats.map(s=>`
        <div class="card p-5 cursor-pointer hover:shadow-md transition-shadow" onclick="nav('${s.page}')">
          <div class="flex items-center gap-3">
            <span class="text-2xl">${s.icon}</span>
            <div>
              <p class="text-2xl font-bold text-slate-800 dark:text-white">${s.val}</p>
              <p class="text-xs text-slate-500 dark:text-slate-400">${s.label}</p>
            </div>
          </div>
        </div>`).join('')}
    </div>

    ${submitted.length>0?`
    <div class="mb-6 p-4 bg-violet-50 dark:bg-violet-900/20 border border-violet-200 dark:border-violet-700 rounded-xl flex items-center gap-3">
      <span class="text-violet-600 text-xl">📋</span>
      <div class="flex-1">
        <p class="font-medium text-violet-800 dark:text-violet-300">${submitted.length} post${submitted.length!==1?'s':''} pending review</p>
        <p class="text-sm text-violet-600 dark:text-violet-400">Team members have submitted posts for approval.</p>
      </div>
      <button class="btn btn-p btn-sm" onclick="nav('posts')">Review Now</button>
    </div>`:''}

    <!-- Getting started -->
    ${brands.length===0?`
    <div class="card p-6 mb-6 border-dashed border-2 border-indigo-200 dark:border-indigo-700 text-center">
      <p class="text-lg font-semibold text-slate-700 dark:text-slate-200 mb-2">👋 Welcome to CaptionCraft!</p>
      <p class="text-slate-500 dark:text-slate-400 text-sm mb-4">Start by creating a brand profile, then create your first post.</p>
      <div class="flex gap-3 justify-center">
        <button class="btn btn-p" onclick="nav('brands')">Create Brand</button>
        <button class="btn btn-o" onclick="nav('create-post')">Create Post</button>
      </div>
    </div>`:''}

    <div class="grid md:grid-cols-2 gap-6">
      <!-- Upcoming -->
      <div class="card">
        <div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-700">
          <h3 class="font-semibold text-slate-800 dark:text-white">Upcoming Scheduled</h3>
          <button class="btn btn-o btn-sm" onclick="nav('calendar')">View Calendar</button>
        </div>
        <div class="p-4 space-y-3">
          ${upcomingSched.length===0?`<p class="text-sm text-slate-400">No scheduled posts yet.</p>`:
          upcomingSched.map(p=>{
            const b=getBrand(p.brand_profile_id);
            return`<div class="flex items-center gap-3">
              ${p.image_url?`<img src="${esc(p.image_url)}" class="w-10 h-10 rounded-lg object-cover flex-shrink-0">`:`<div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-lg flex-shrink-0">🖼️</div>`}
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate text-slate-800 dark:text-white">${esc(b?.name||'Unknown Brand')}</p>
                <p class="text-xs text-slate-500">${fmtDateTime(p.scheduled_at)}</p>
              </div>
              ${statusBadge(p.status)}
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Brand profiles -->
      <div class="card">
        <div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-700">
          <h3 class="font-semibold text-slate-800 dark:text-white">Brand Profiles</h3>
          <button class="btn btn-o btn-sm" onclick="nav('brands')">Manage</button>
        </div>
        <div class="p-4 space-y-3">
          ${brandList.length===0?`<p class="text-sm text-slate-400">No brands yet.</p>`:
          brandList.map(b=>`
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style="background:${b.color||'#6366f1'}">${(b.name||'?')[0].toUpperCase()}</div>
              <div class="flex-1 min-w-0">

function cpTogglePlatform(p){
  if(cpState.platforms.includes(p))cpState.platforms=cpState.platforms.filter(x=>x!==p);
  else cpState.platforms=[...cpState.platforms,p];
  renderCreatePost();
}

async function cpHandleImages(e){
  const files=Array.from(e.target.files);
  for(const f of files){
    if(f.size>2*1024*1024){toast('Image too large (max 2MB)','err');continue;}
    const url=await readFileAsDataURL(f);
    cpState.images.push(url);
  }
  renderCreatePost();
}

function cpRemoveImage(i){cpState.images.splice(i,1);renderCreatePost()}

async function cpGenerate(){
  const brand=DB.brands().find(b=>b.id===cpState.brandId);
  if(!brand)return;
  const key=localStorage.getItem('cc_api_key');
  if(!key){
    cpState.caption=generateCaptionMock(brand,cpState.platforms,cpState.customPrompt);
    renderCreatePost();
    toast('Using mock captions — add a Claude API key in Settings for real AI','info');
    return;
  }
  cpState.generating=true;
  renderCreatePost();
  const length=brand.output_length||'medium';
  const hashtags=brand.include_hashtags!==false?'Include relevant hashtags.':'Do not include hashtags.';
  const emojis=brand.include_emojis!==false?'Use emojis where appropriate.':'Do not use emojis.';
  const sys='You are a social media copywriter. Write ONLY the caption text — no commentary, no explanations, no quotation marks, nothing else.';
  const textPrompt=`Write a ${length} social media caption for the brand "${brand.name}".
Brand tone: ${brand.tone||'professional'}
Brand guidelines: ${brand.brand_guidelines||'N/A'}
Platforms: ${(cpState.platforms||[]).join(', ')||'instagram'}
${hashtags}
${emojis}
${cpState.customPrompt?'Additional instructions: '+cpState.customPrompt:''}
${cpState.images.length>0?'The caption MUST be specifically about the content shown in the attached image above. Describe what you see and make the caption relevant to it.':'Write an engaging caption that reflects the brand voice.'}`;
  const content=cpState.images.length>0?buildImageContent(cpState.images[0],textPrompt):textPrompt;
  const result=await callClaude(sys,content,512);
  cpState.generating=false;
  if(result){cpState.caption=result;toast('Caption generated!');}
  renderCreatePost();
}

function cpSave(status){
  if(!cpState.brandId){toast('Select a brand first','err');return}
  cpState.saving=true;
  renderCreatePost();
  const posts=DB.posts();
  posts.unshift({
    id:uid(),brand_profile_id:cpState.brandId,
    image_url:cpState.images[0]||null,
    image_urls:[...cpState.images],
    caption:cpState.caption,
    platforms:[...cpState.platforms],
    status,
    scheduled_at:cpState.scheduledAt||null,
    created_date:new Date().toISOString(),
    client_visible:false,client_approved:false,
  });
  DB.save.posts(posts);
  cpState={brandId:'',platforms:['instagram'],caption:'',images:[],scheduledAt:'',customPrompt:'',generating:false,saving:false,mode:'single'};
  toast(status==='draft'?'Draft saved!':'Post scheduled!');
  nav('posts');
}

function bulkTogglePlatform(p){
  if(bulkPlatforms.includes(p))bulkPlatforms=bulkPlatforms.filter(x=>x!==p);
  else bulkPlatforms=[...bulkPlatforms,p];
  renderBulkPost();
}

async function bulkHandleImage(e,idx){
  const f=e.target.files[0];
  if(!f)return;
  if(f.size>2*1024*1024){toast('Image too large (max 2MB)','err');return;}
  bulkRows[idx].image=await readFileAsDataURL(f);
  renderBulkPost();
}

function bulkRemoveImage(idx){bulkRows[idx].image=null;renderBulkPost();}
function bulkRemoveRow(idx){if(bulkRows.length===1)return;bulkRows.splice(idx,1);renderBulkPost();}
function bulkAddRow(){if(bulkRows.length<10){bulkRows.push({image:null,prompt:'',caption:'',status:'idle'});renderBulkPost();}}

async function bulkGenerateAll(){
  bulkBrandId=document.getElementById('bulk-brand')?.value||bulkBrandId;
  const brand=DB.brands().find(b=>b.id===bulkBrandId);
  if(!brand){toast('Select a brand first','err');return;}
  const key=localStorage.getItem('cc_api_key');
  if(!key){toast('Add a Claude API key in Settings','err');return;}
  bulkGenerating=true;
  renderBulkPost();
  const sys='You are a social media copywriter. Write ONLY the caption text — no commentary, no explanations.';
  for(let i=0;i<bulkRows.length;i++){
    const row=bulkRows[i];
    if(!row.image&&!row.prompt)continue;
    bulkRows[i].status='generating';
    const textPrompt=`Write a ${brand.output_length||'medium'} social media caption for "${brand.name}".
Tone: ${brand.tone||'professional'}
Guidelines: ${brand.brand_guidelines||'N/A'}
Platforms: ${bulkPlatforms.join(', ')||'instagram'}
${brand.include_hashtags!==false?'Include hashtags.':'No hashtags.'}
${brand.include_emojis!==false?'Use emojis.':'No emojis.'}
${row.prompt?'Additional instructions: '+row.prompt:''}
${row.image?'The caption MUST be specifically about the content shown in the attached image. Describe it and make the caption relevant.':''}`;
    const content=row.image?buildImageContent(row.image,textPrompt):textPrompt;
    const result=await callClaude(sys,content,400);
    bulkRows[i].caption=result||'';
    bulkRows[i].status=result?'done':'idle';
  }
  bulkGenerating=false;
  renderBulkPost();
  toast('All captions generated!');
}

function bulkSaveAllDrafts(){
  bulkBrandId=document.getElementById('bulk-brand')?.value||bulkBrandId;
  if(!bulkBrandId){toast('Select a brand first','err');return;}
  const toSave=bulkRows.filter(r=>r.caption);
  if(!toSave.length){toast('No captions to save','err');return;}
  const posts=DB.posts();
  toSave.forEach(r=>{
    posts.unshift({id:uid(),brand_profile_id:bulkBrandId,caption:r.caption,platforms:[...bulkPlatforms],status:'draft',image_url:r.image||null,image_urls:r.image?[r.image]:[],created_date:new Date().toISOString(),client_visible:false,client_approved:false});
  });
  DB.save.posts(posts);
  toast(`${toSave.length} draft${toSave.length>1?'s':''} saved!`);
  bulkRows=[{image:null,prompt:'',caption:'',status:'idle'}];
  nav('posts');
}

// ── Buffer / Later via Make.com ──────────────────────────────────────────────
async function sendToBuffer(id){
  const webhookUrl=(DB.settings().makeWebhookUrl||'').trim();
  if(!webhookUrl){
    toast('Add your Make.com webhook URL in Settings → Publishing first','err');
    return;
  }
  const p=DB.posts().find(x=>x.id===id);
  if(!p){toast('Post not found','err');return;}
  const brand=DB.brands().find(b=>b.id===p.brand_profile_id)||{};
  const btn=document.querySelector(`[data-buffer-id="${id}"]`);
  if(btn){btn.disabled=true;btn.textContent='⏳ Sending...';}
  try{
    const bufferChannelDetails=(brand.buffer_channels||[]).map(cid=>{
      const ch=(DB.settings().bufferChannels||[]).find(c=>c.id===cid);
      return ch?{id:cid,name:ch.name,service:ch.service,bufferId:ch.bufferId||''}:{id:cid};
    });
    const payload={
      post_id:p.id,
      caption:p.caption||'',
      platforms:p.platforms||[],
      scheduled_at:p.scheduled_at||null,
      brand_name:brand.name||'',
      brand_id:p.brand_profile_id||'',
      image_url:p.image_url||null,
      status:p.status,
      buffer_channels:bufferChannelDetails,
      source:'CaptionCraft'
    };
    const r=await fetch(webhookUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(r.ok||r.status===200||r.status===204){
      DB.save.posts(DB.posts().map(x=>x.id===id?{...x,status:'scheduled',buffer_sent:true,buffer_sent_at:new Date().toISOString()}:x));
      toast('✅ Sent to Buffer via Make.com! Post marked as Scheduled.');
      renderPosts();
    }else{
      toast(`Make.com returned ${r.status} — check your webhook URL`,'err');
    }
  }catch(e){
    toast(`Failed to reach Make.com: ${e.message}`,'err');
  }
}

async function sendAllApprovedToBuffer(){
  const approved=DB.posts().filter(p=>p.status==='approved'&&!p.buffer_sent);
  if(approved.length===0){toast('No approved posts to send','info');return;}
  let sent=0;
  for(const p of approved){
    await sendToBuffer(p.id);
    sent++;
  }
  toast(`Sent ${sent} post${sent!==1?'s':''} to Buffer`);
}

let calMonth=new Date();
let calDragPost=null;

function renderCalendar(){
  const posts=DB.posts().filter(p=>p.scheduled_at);
  const brands=DB.brands();
  const year=calMonth.getFullYear(),month=calMonth.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  const startDow=firstDay.getDay();
  const totalDays=lastDay.getDate();
  const today=new Date();

  // Build grid: pad with previous month days
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=totalDays;d++)cells.push(new Date(year,month,d));

  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];

  document.getElementById('page').innerHTML=`
  <div class="p-6 max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Content Calendar</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Drag posts to reschedule. Click to preview.</p>
      </div>
      <button class="btn btn-p" onclick="nav('create-post')">✏️ New Post</button>
    </div>

    <div class="card overflow-hidden">
      <!-- Month nav -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
        <button class="btn btn-o btn-sm" onclick="calPrev()">‹ Prev</button>
        <h2 class="font-semibold text-lg text-slate-800 dark:text-white">${monthNames[month]} ${year}</h2>
        <button class="btn btn-o btn-sm" onclick="calNext()">Next ›</button>
      </div>
      <!-- Day headers -->
      <div class="grid grid-cols-7 border-b border-slate-200 dark:border-slate-700">
        ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="text-center text-xs font-medium text-slate-500 py-2">${d}</div>`).join('')}
      </div>
      <!-- Days -->
      <div class="grid grid-cols-7">
        ${cells.map((day,i)=>{
          if(!day)return`<div class="cal-day bg-slate-50 dark:bg-slate-800/50" style="min-height:80px"></div>`;
          const isToday=day.getDate()===today.getDate()&&day.getMonth()===today.getMonth()&&day.getFullYear()===today.getFullYear();
          const dayPosts=posts.filter(p=>{
            const d=new Date(p.scheduled_at);
            return d.getDate()===day.getDate()&&d.getMonth()===day.getMonth()&&d.getFullYear()===day.getFullYear();
          });
          return`<div class="cal-day" ondragover="calDragOver(event)" ondrop="calDrop(event,'${day.toISOString()}')" ondragleave="this.classList.remove('bg-blue-50','dark:bg-blue-900')">
            <span class="text-xs font-medium w-6 h-6 flex items-center justify-center rounded-full ${isToday?'bg-indigo-600 text-white':'text-slate-600 dark:text-slate-300'}">${day.getDate()}</span>
            <div class="mt-1">
              ${dayPosts.slice(0,2).map(p=>{
                const b=brands.find(br=>br.id===p.brand_profile_id);
                return`<div class="cal-pill" style="background:${b?.color||'#6366f1'}" draggable="true" ondragstart="calDragStart(event,'${p.id}')" onclick="openPostPreview('${p.id}');event.stopPropagation()" title="${esc(b?.name||'Post')}">${esc(b?.name||'Post')}</div>`;
              }).join('')}
              ${dayPosts.length>2?`<div class="text-xs text-slate-400 pl-1">+${dayPosts.length-2}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

function calPrev(){calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);renderCalendar()}
function calNext(){calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);renderCalendar()}
function calDragStart(e,postId){calDragPost=postId;e.dataTransfer.effectAllowed='move'}
function calDragOver(e){e.preventDefault();e.currentTarget.style.background='#eff6ff'}
function calDrop(e,dateIso){
  e.preventDefault();
  e.currentTarget.style.background='';
  if(!calDragPost)return;
  const posts=DB.posts();
  const p=posts.find(x=>x.id===calDragPost);
  if(!p){calDragPost=null;return}
  const oldDate=new Date(p.scheduled_at||new Date());
  const newBase=new Date(dateIso);
  newBase.setHours(oldDate.getHours(),oldDate.getMinutes(),0,0);
  if(confirm(`Reschedule to ${fmtDate(newBase.toISOString())}?`)){
    DB.save.posts(posts.map(x=>x.id===calDragPost?{...x,scheduled_at:newBase.toISOString()}:x));
    toast('Post rescheduled!');
    renderCalendar();
  }
  calDragPost=null;
}

function saveBrand(id){

    facebook:document.getElementById('bm-sm-facebook')?.value.trim().replace(/^@/,'')||null,

    tiktok:document.getElementById('bm-sm-tiktok')?.value.trim().replace(/^@/,'')||null,

async function autofillBrandFromWebsite(){
  const url=document.getElementById('bm-website')?.value?.trim();
  if(!url){toast('Enter a website URL first','err');return;}
  const key=localStorage.getItem('cc_api_key');
  if(!key){toast('Add your Claude API key in Settings first','err');return;}
  const btn=document.getElementById('bm-autofill-btn');
  if(btn){btn.disabled=true;btn.textContent='⏳ Fetching...';}
  try{
    // Try multiple CORS proxies in sequence
    const proxies=[
      async()=>{const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(20000)});if(!r.ok)throw new Error('corsproxy failed');return r.text();},
      async()=>{const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,{signal:AbortSignal.timeout(20000)});if(!r.ok)throw new Error('allorigins failed');const j=await r.json();return j.contents||'';},
    ];
    let rawHtml='';
    for(const proxy of proxies){
      try{rawHtml=await proxy();if(rawHtml)break;}catch(e){/* try next */}
    }
    if(!rawHtml){toast('Could not reach website — try pasting copy into the Analyse modal instead','err');if(btn){btn.disabled=false;btn.textContent='🪄 Auto-fill';}return;}
    // Extract social media links before stripping HTML
    const socialPatterns={
      instagram:/(?:https?:\/\/)?(?:www\.)?instagram\.com\/([A-Za-z0-9_.]+)/gi,
      facebook:/(?:https?:\/\/)?(?:www\.)?facebook\.com\/([A-Za-z0-9_./-]+)/gi,
      linkedin:/(?:https?:\/\/)?(?:www\.)?linkedin\.com\/(?:company|in)\/([A-Za-z0-9_.-]+)/gi,
      tiktok:/(?:https?:\/\/)?(?:www\.)?tiktok\.com\/@([A-Za-z0-9_.]+)/gi,
      twitter:/(?:https?:\/\/)?(?:www\.)?(?:twitter|x)\.com\/([A-Za-z0-9_]+)/gi,
    };
    const socialLinks={};
    for(const[platform,re]of Object.entries(socialPatterns)){
      const matches=[...rawHtml.matchAll(re)];
      if(matches.length){const handle=matches[0][1].replace(/\/$/, '');if(handle&&!['home','share','intent','hashtag','search'].includes(handle))socialLinks[platform]=handle;}
    }
    const socialLinksStr=Object.keys(socialLinks).length?JSON.stringify(socialLinks):'none found';
    let text=rawHtml.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,' ').replace(/<script[^>]*>[\s\S]*?<\/script>/gi,' ').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,4000);
    if(!text){toast('Could not read website — try pasting copy into the Analyse modal instead','err');return;}
    if(btn)btn.textContent='🤖 Analysing...';
    const sys='You are a brand strategist. Respond ONLY with valid JSON, no markdown, no explanation.';
    const prompt=`Analyse this website text and return a JSON object with these exact keys:
- name: the brand or company name (string)
- tone: one of professional/casual/playful/luxury/inspirational/friendly
- output_length: one of short/medium/long (based on how detailed their content is)
- brand_guidelines: 2-3 sentences describing their voice, values, and what to emphasise in social posts
- color: a hex color code that best represents the brand visually (e.g. "#f97316")
- social_handles: an object with keys instagram, facebook, linkedin, tiktok, twitter — use the detected handles below, set null for any not found

Detected social media handles (from page links): ${socialLinksStr}

Website text:
${text}`;
    const result=await callClaude(sys,prompt,500);
    if(!result)return;
    let parsed=null;
    try{parsed=JSON.parse(result);}catch(e){const m=result.match(/\{[\s\S]*\}/);if(m)try{parsed=JSON.parse(m[0]);}catch(e2){}}
    if(!parsed){toast('AI returned unexpected format — try again','err');return;}
    if(parsed.name&&document.getElementById('bm-name'))document.getElementById('bm-name').value=parsed.name;
    if(parsed.tone&&document.getElementById('bm-tone'))document.getElementById('bm-tone').value=parsed.tone;
    if(parsed.output_length&&document.getElementById('bm-length'))document.getElementById('bm-length').value=parsed.output_length;
    if(parsed.brand_guidelines&&document.getElementById('bm-guidelines'))document.getElementById('bm-guidelines').value=parsed.brand_guidelines;
    if(parsed.color&&document.getElementById('bm-color'))document.getElementById('bm-color').value=parsed.color;
    if(parsed.social_handles){
      ['instagram','facebook','linkedin','tiktok','twitter'].forEach(p=>{
        const el=document.getElementById('bm-sm-'+p);
        if(el&&parsed.social_handles[p])el.value=parsed.social_handles[p];
      });
    }
    toast('Brand fields auto-filled from website! ✓');
  }catch(e){
    if(e.name==='TimeoutError')toast('Website fetch timed out — try pasting copy into the Analyse modal','err');
    else toast('Error: '+e.message,'err');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='🪄 Auto-fill';}
  }
}

        ${parsed.content_recommendations?.length?`<div><p class="font-medium text-slate-700 dark:text-slate-200 mb-1">Content Ideas</p><ul class="list-disc pl-4 space-y-1">${parsed.content_recommendations.map(m=>`<li class="text-slate-600 dark:text-slate-300">${esc(m)}</li>`).join('')}</ul></div>`:''}
        <p class="text-xs text-emerald-600">✓ Tone and guidelines auto-saved to brand profile</p>`;

  } else {
    const resultEl=document.getElementById('ai-analyse-result');

  renderBrands();
}

async function photoUpload(e){
  const files=Array.from(e.target.files);
  let count=0;
  for(const f of files){
    const url=await readFileAsDataURL(f);
    const photos=DB.photos();
    photos.unshift({id:uid(),url,name:f.name.replace(/\.[^.]+$/,''),tags:[],folder_id:photoFolderId,created_date:new Date().toISOString()});
    DB.save.photos(photos);
    count++;
  }
  if(count>0)toast(`${count} photo${count!==1?'s':''} uploaded!`);
  renderPhotoLibrary();
}

function deletePhoto(id){
  confirm2('Delete this photo?','',()=>{
    DB.save.photos(DB.photos().filter(p=>p.id!==id));
    toast('Photo deleted');
    renderPhotoLibrary();
  });
}

function renamePhoto(id,name){
  DB.save.photos(DB.photos().map(p=>p.id===id?{...p,name}:p));
}

function addPhotoTag(id,tag){
  const t=tag.trim();
  if(!t)return;
  const photos=DB.photos();
  const p=photos.find(x=>x.id===id);
  if(!p)return;
  p.tags=[...(p.tags||[]).filter(x=>x!==t),t];
  DB.save.photos(photos);
  renderPhotoLibrary();
}

function removePhotoTag(id,tag){
  const photos=DB.photos();
  const p=photos.find(x=>x.id===id);
  if(!p)return;
  p.tags=(p.tags||[]).filter(t=>t!==tag);
  DB.save.photos(photos);
  renderPhotoLibrary();
}

function movePhotoToFolder(id,folderId){
  DB.save.photos(DB.photos().map(p=>p.id===id?{...p,folder_id:folderId||null}:p));
  toast('Moved!');
  renderPhotoLibrary();
}

  const posts=DB.posts();

  const published=posts.filter(p=>p.status==='published');
  const scheduled=posts.filter(p=>p.status==='scheduled');
  const drafts=posts.filter(p=>p.status==='draft');
  const approvedByClient=posts.filter(p=>p.client_approved);
  const clientVisible=posts.filter(p=>p.client_visible);
  const approvalRate=clientVisible.length>0?Math.round(approvedByClient.length/clientVisible.length*100):0;

  // Monthly data (last 6 months)
  const months=[];
  const now=new Date();
  for(let i=5;i>=0;i--){
    const m=new Date(now.getFullYear(),now.getMonth()-i,1);
    const mEnd=new Date(now.getFullYear(),now.getMonth()-i+1,0);
    months.push({
      label:m.toLocaleDateString('en-US',{month:'short',year:'2-digit'}),
      published:posts.filter(p=>{const d=new Date(p.created_date);return p.status==='published'&&d>=m&&d<=mEnd}).length,
      scheduled:posts.filter(p=>{const d=new Date(p.created_date);return p.status==='scheduled'&&d>=m&&d<=mEnd}).length,
      drafts:posts.filter(p=>{const d=new Date(p.created_date);return p.status==='draft'&&d>=m&&d<=mEnd}).length,
    });
  }

  // Platform breakdown
  const platformCounts={};
  posts.forEach(p=>(p.platforms||[]).forEach(pl=>{platformCounts[pl]=(platformCounts[pl]||0)+1}));

  document.getElementById('page').innerHTML=`
  <div class="p-6 max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Analytics</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Content performance across your brands</p>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      ${[
        {label:'Total Posts',val:posts.length,icon:'📄',c:'text-violet-500'},
        {label:'Published',val:published.length,icon:'✅',c:'text-green-500'},
        {label:'Scheduled',val:scheduled.length,icon:'📅',c:'text-blue-500'},
        {label:'Client Approval Rate',val:approvalRate+'%',icon:'👍',c:'text-orange-500'},
      ].map(s=>`
        <div class="card p-4 flex items-center gap-3">
          <span class="text-2xl">${s.icon}</span>
          <div>
            <p class="text-2xl font-bold text-slate-800 dark:text-white">${s.val}</p>
            <p class="text-xs text-slate-500">${s.label}</p>
          </div>
        </div>`).join('')}
    </div>

    <div class="grid md:grid-cols-2 gap-6 mb-6">
      <!-- Monthly chart -->
      <div class="card p-4">
        <h3 class="font-semibold text-slate-800 dark:text-white mb-4">Posts Over Time</h3>
        <canvas id="monthly-chart" height="200"></canvas>
      </div>
      <!-- Platform chart -->
      <div class="card p-4">
        <h3 class="font-semibold text-slate-800 dark:text-white mb-4">Platform Breakdown</h3>
        <canvas id="platform-chart" height="200"></canvas>
      </div>
    </div>

    <!-- Brand breakdown table -->
    <div class="card">
      <div class="p-4 border-b border-slate-100 dark:border-slate-700">
        <h3 class="font-semibold text-slate-800 dark:text-white">By Brand</h3>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100 dark:border-slate-700">
              <th class="text-left p-3 text-slate-500 font-medium">Brand</th>
              <th class="text-center p-3 text-slate-500 font-medium">Total</th>
              <th class="text-center p-3 text-slate-500 font-medium">Published</th>
              <th class="text-center p-3 text-slate-500 font-medium">Scheduled</th>
              <th class="text-center p-3 text-slate-500 font-medium">Drafts</th>
            </tr>
          </thead>
          <tbody>
            ${brands.length===0?`<tr><td colspan="5" class="text-center p-6 text-slate-400">No brands yet</td></tr>`:
            brands.map(b=>{
              const bp=posts.filter(p=>p.brand_profile_id===b.id);
              return`<tr class="border-b border-slate-50 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                <td class="p-3">
                  <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full" style="background:${b.color||'#6366f1'}"></div>
                    <span class="font-medium text-slate-700 dark:text-slate-200">${esc(b.name)}</span>
                  </div>
                </td>
                <td class="text-center p-3 text-slate-700 dark:text-slate-200">${bp.length}</td>
                <td class="text-center p-3"><span class="badge bd-pub">${bp.filter(p=>p.status==='published').length}</span></td>
                <td class="text-center p-3"><span class="badge bd-sched">${bp.filter(p=>p.status==='scheduled').length}</span></td>
                <td class="text-center p-3"><span class="badge bd-draft">${bp.filter(p=>p.status==='draft').length}</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  // Render charts
  setTimeout(()=>{
    const isDarkMode=document.documentElement.classList.contains('dark');
    const gridColor=isDarkMode?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.06)';
    const textColor=isDarkMode?'#94a3b8':'#64748b';

    const mc=document.getElementById('monthly-chart');
    if(mc){
      if(analyticsChart)analyticsChart.destroy();
      analyticsChart=new Chart(mc,{
        type:'bar',
        data:{
          labels:months.map(m=>m.label),
          datasets:[
            {label:'Published',data:months.map(m=>m.published),backgroundColor:'#22c55e'},
            {label:'Scheduled',data:months.map(m=>m.scheduled),backgroundColor:'#3b82f6'},
            {label:'Drafts',data:months.map(m=>m.drafts),backgroundColor:'#f59e0b'},
          ]
        },
        options:{
          responsive:true,maintainAspectRatio:true,
          plugins:{legend:{labels:{color:textColor,font:{size:11}}}},
          scales:{
            x:{grid:{color:gridColor},ticks:{color:textColor}},
            y:{grid:{color:gridColor},ticks:{color:textColor,stepSize:1},beginAtZero:true},
          }
        }
      });
    }

    const pc=document.getElementById('platform-chart');
    if(pc){
      if(analyticsPlatformChart)analyticsPlatformChart.destroy();
      const labels=Object.keys(platformCounts);
      analyticsPlatformChart=new Chart(pc,{
        type:'doughnut',
        data:{
          labels:labels.map(l=>l[0].toUpperCase()+l.slice(1)),
          datasets:[{data:labels.map(l=>platformCounts[l]),backgroundColor:['#6366f1','#3b82f6','#0ea5e9','#8b5cf6']}]
        },
        options:{
          responsive:true,maintainAspectRatio:true,
          plugins:{legend:{position:'bottom',labels:{color:textColor,font:{size:11}}}}
        }
      });
    }
  },50);
}

function openClientModal(id){
  const c=id?DB.clients().find(x=>x.id===id):null;
  const brands=DB.brands();
  showModal(`<div class="modal">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-semibold text-slate-800 dark:text-white">${c?'Edit Client':'Add Client'}</h3>
      <button class="btn btn-o btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="space-y-4">
      <div>
        <label class="lbl">Client Name *</label>
        <input class="inp" id="cl-name" placeholder="Client name" value="${esc(c?.name||'')}">
      </div>
      <div>
        <label class="lbl">Email</label>
        <input class="inp" id="cl-email" type="email" placeholder="client@company.com" value="${esc(c?.email||'')}">
      </div>
      <div>
        <label class="lbl">Linked Brand</label>
        <select class="sel" id="cl-brand">
          <option value="">No brand linked</option>
          ${brands.map(b=>`<option value="${b.id}"${c?.brand_profile_id===b.id?' selected':''}>${esc(b.name)}</option>`).join('')}
        </select>
      </div>
      <div>
        <label class="lbl">Portal Password</label>
        <input class="inp" id="cl-password" type="password" placeholder="Set portal access password" value="${esc(c?.portal_password||'')}">
        <p class="text-xs text-slate-400 mt-1">Clients use this password to access their portal</p>
      </div>
      <div class="flex gap-3 justify-end pt-2">
        <button class="btn btn-o" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="saveClient('${id||''}')">Save</button>
      </div>
    </div>
  </div>`);
}

function saveClient(id){
  const name=document.getElementById('cl-name').value.trim();
  if(!name){toast('Client name required','err');return}
  const data={name,email:document.getElementById('cl-email').value,brand_profile_id:document.getElementById('cl-brand').value,portal_password:document.getElementById('cl-password').value};
  const clients=DB.clients();
  if(id){
    DB.save.clients(clients.map(c=>c.id===id?{...c,...data}:c));
    toast('Client updated!');
  }else{
    clients.unshift({id:uid(),created_date:new Date().toISOString(),...data});
    DB.save.clients(clients);
    toast('Client added!');
  }
  closeModal();
  renderClients();
}

function deleteClient(id){
  confirm2('Remove this client?','',()=>{
    DB.save.clients(DB.clients().filter(c=>c.id!==id));
    toast('Client removed');
    renderClients();
  });
}

function openTeamModal(){
  showModal(`<div class="modal" style="max-width:400px">

      <h3 class="text-lg font-semibold text-slate-800 dark:text-white">Invite Team Member</h3>

        <label class="lbl">Name</label>
        <input class="inp" id="tm-name" placeholder="Full name">
      </div>
      <div>
        <label class="lbl">Email *</label>
        <input class="inp" id="tm-email" type="email" placeholder="team@agency.com">
      </div>
      <div>

        <select class="sel" id="tm-role">
          <option value="admin">Admin</option>

          <option value="viewer">Viewer</option>
        </select>
      </div>

function saveTeamMember(){
  const email=document.getElementById('tm-email').value.trim();
  if(!email){toast('Email required','err');return}
  const team=DB.team();
  if(team.find(m=>m.email===email)){toast('Already invited','err');return}
  team.push({id:uid(),name:document.getElementById('tm-name').value.trim(),email,role:document.getElementById('tm-role').value,invited_date:new Date().toISOString()});
  DB.save.team(team);
  closeModal();
  toast('Invite sent (simulated)!');
  renderTeam();
}

function removeTeamMember(id){
  confirm2('Remove this team member?','They will lose access.',()=>{
    DB.save.team(DB.team().filter(m=>m.id!==id));
    toast('Member removed');
    renderTeam();
  });
}

  if(el){el.textContent=key?'✓ Key saved':'No key set';el.className='text-xs mt-1 '+(key?'text-emerald-600':'text-slate-400');}
  toast(key?'Claude API key saved!':'API key cleared');

async function testClaudeConnection(){
  const btn=document.getElementById('s-test-btn');
  const res=document.getElementById('s-test-result');
  if(btn){btn.disabled=true;btn.textContent='⏳ Testing...';}
  if(res){res.className='text-sm p-3 rounded-lg bg-slate-100 dark:bg-slate-700';res.textContent='Connecting to Claude API...';}
  const key=localStorage.getItem('cc_api_key');
  const model=localStorage.getItem('cc_model')||'claude-sonnet-4-6';
  if(!key){
    if(res){res.className='text-sm p-3 rounded-lg bg-red-50 text-red-700';res.textContent='❌ No API key saved. Enter your key above and click Save first.';}
    if(btn){btn.disabled=false;btn.textContent='🧪 Test Connection';}
    return;
  }
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'x-api-key':key,'anthropic-version':'2023-06-01','content-type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model,max_tokens:20,messages:[{role:'user',content:'Say "API OK" only.'}]})
    });
    const data=await r.json();
    if(r.ok){
      const reply=data.content?.[0]?.text||'(no text)';
      if(res){res.className='text-sm p-3 rounded-lg bg-emerald-50 text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300';res.textContent=`✅ Connected! Claude replied: "${reply}" — Model: ${model}`;}
    }else{
      if(res){res.className='text-sm p-3 rounded-lg bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-300';res.textContent=`❌ API error ${r.status}: ${data.error?.message||JSON.stringify(data)}`;}
    }
  }catch(e){
    if(res){res.className='text-sm p-3 rounded-lg bg-red-50 text-red-700 dark:bg-red-900/30 dark:text-red-300';res.textContent=`❌ Network error: ${e.message}. Make sure you're opening this page in your own browser at http://localhost:3456 — not in a sandboxed preview.`;}
  }
  if(btn){btn.disabled=false;btn.textContent='🧪 Test Connection';}
}

function bufferServiceIcon(service){
  const icons={instagram:'📸',facebook:'📘',twitter:'𝕏',linkedin:'💼',tiktok:'🎵',pinterest:'📌',youtube:'🎬',other:'🔗'};
  return icons[service]||'🔗';
}

function toggleAddChannelForm(){
  const f=document.getElementById('s-add-channel-form');
  if(!f)return;
  f.classList.toggle('hidden');
  if(!f.classList.contains('hidden')){
    document.getElementById('s-ch-name')?.focus();
  }
}

function addBufferChannel(){
  const name=document.getElementById('s-ch-name')?.value.trim();
  const service=document.getElementById('s-ch-service')?.value||'instagram';
  const bufferId=document.getElementById('s-ch-bufferid')?.value.trim()||'';
  if(!name){toast('Channel name required','err');return;}
  const s=DB.settings();
  const channels=[...(s.bufferChannels||[]),{id:uid(),name,service,bufferId}];
  DB.save.settings({...s,bufferChannels:channels});
  toast('Buffer channel added!');
  renderSettings();
}

function removeBufferChannel(id){
  const s=DB.settings();
  DB.save.settings({...s,bufferChannels:(s.bufferChannels||[]).filter(c=>c.id!==id)});
  toast('Channel removed');
  renderSettings();
}

function saveWebhookUrl(){
  const url=document.getElementById('s-webhook').value.trim();
  const autoSend=document.getElementById('s-auto-buffer')?.checked||false;
  const s=DB.settings();
  DB.save.settings({...s,makeWebhookUrl:url,autoSendOnApprove:autoSend});
  const el=document.getElementById('s-webhook-status');
  if(el){el.textContent=url?'✓ Webhook saved — click 📤 Buffer on any approved post to push it':'No webhook set';el.className='text-xs mt-1 '+(url?'text-emerald-600':'text-slate-400');}
  toast(url?'Buffer webhook saved!':'Webhook cleared');
  renderSettings();
}

function saveSettings(){
  const plats=['instagram','facebook','linkedin'].filter(p=>document.getElementById('s-plat-'+p)?.checked);
  const s=DB.settings();
  DB.save.settings({
    ...s,
    workspaceName:document.getElementById('s-workspace').value,
    timezone:document.getElementById('s-timezone').value,
    defaultPlatforms:plats,
    emailNotifications:document.getElementById('s-notifs').checked,
    makeWebhookUrl:document.getElementById('s-webhook')?.value.trim()||s.makeWebhookUrl||'',
    autoSendOnApprove:document.getElementById('s-auto-buffer')?.checked||false,
  });
  const modelEl=document.getElementById('s-model');
  if(modelEl)localStorage.setItem('cc_model',modelEl.value);
  toast('Settings saved!');
}

function exportData(){
  const data={brands:DB.brands(),posts:DB.posts(),photos:DB.photos().map(p=>({...p,url:'[base64 omitted]'})),clients:DB.clients(),team:DB.team(),settings:DB.settings()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='captioncraft-export.json';
  a.click();
  toast('Data exported!');
}

function clearAllData(){

async function generateHolidayCaption(idx){
  const brandId=document.getElementById(`hol-brand-${idx}`)?.value;
  const brand=DB.brands().find(b=>b.id===brandId);
  if(!brand)return;
  const h=HOLIDAYS_2026[idx];
  const key=localStorage.getItem('cc_api_key');
  if(!key){toast('Add a Claude API key in Settings','err');return;}
  const btn=document.querySelector(`#hol-${idx} button[onclick*="generateHolidayCaption"]`);
  if(btn){btn.disabled=true;btn.textContent='Generating...';}
  const sys='You are a social media copywriter. Write ONLY the caption text — no commentary, no explanations.';
  const prompt=`Write a ${brand.output_length||'medium'} social media caption for the brand "${brand.name}" celebrating ${h.name} (${h.date}).
Tone: ${brand.tone||'professional'}
Brand guidelines: ${brand.brand_guidelines||'N/A'}
${brand.include_hashtags!==false?'Include relevant holiday hashtags.':'No hashtags.'}
${brand.include_emojis!==false?'Use festive emojis where appropriate.':'No emojis.'}`;
  const result=await callClaude(sys,prompt,400);
  if(btn){btn.disabled=false;btn.textContent='✨ Generate';}
  if(result){
    holidayResults[idx]=result;
    renderHolidays();
  }
}

function saveHolidayDraft(idx,date,holidayName){
  const caption=document.getElementById(`hol-caption-${idx}`)?.value||holidayResults[idx]||'';
  const brandId=document.getElementById(`hol-brand-${idx}`)?.value;
  if(!brandId||!caption)return;
  const posts=DB.posts();
  posts.unshift({id:uid(),brand_profile_id:brandId,caption,platforms:DB.settings().defaultPlatforms||['instagram'],status:'draft',scheduled_at:date+'T10:00:00',created_date:new Date().toISOString(),client_visible:false,client_approved:false,image_url:'',image_urls:[]});
  DB.save.posts(posts);
  toast(`${holidayName} post saved as draft!`);
}
