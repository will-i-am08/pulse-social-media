[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions."___netlify-server-handler"]
  timeout = 120


[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Clickjacking protection
    X-Frame-Options = "SAMEORIGIN"

    # Legacy XSS filter (still respected by some older browsers)
    X-XSS-Protection = "1; mode=block"

    # Control referrer information sent with requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features / APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # HSTS — force HTTPS for 1 year (enable once you're confident SSL is stable)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Content-Security-Policy is set dynamically per-request in middleware.ts
    # using a cryptographic nonce — this avoids the unsafe-inline warning.
