[build]
  command = "npm run build"
  publish = ".next"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions."___netlify-server-handler"]
  timeout = 120


[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Clickjacking protection
    X-Frame-Options = "SAMEORIGIN"

    # Legacy XSS filter (still respected by some older browsers)
    X-XSS-Protection = "1; mode=block"

    # Control referrer information sent with requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Restrict browser features / APIs
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # HSTS — force HTTPS for 1 year (enable once you're confident SSL is stable)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # CSP: unsafe-inline is required for Next.js hydration scripts (__NEXT_DATA__ etc.)
    # unsafe-inline in style-src is also needed for Tailwind/inline styles.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://images.unsplash.com https://*.supabase.co https://lh3.googleusercontent.com https://*.supabase.in https://images.pexels.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.supabase.in wss://*.supabase.in; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
